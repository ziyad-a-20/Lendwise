{% extends "auth_base.html" %}
{% block title %}Sign In — LendWise{% endblock %}

{% block card_content %}
  <div class="auth-card-title">Welcome back</div>
  <div class="auth-card-sub">Sign in to your account to continue</div>

  <form method="POST" class="auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="auth-field-label" for="username">Username</label>
      <div class="auth-input-wrap">
        <i class="ti ti-user auth-input-icon"></i>
        <input class="auth-input" type="text" id="username" name="username"
               placeholder="Enter your username"
               autocomplete="username" required>
      </div>
    </div>
    <div>
      <label class="auth-field-label" for="password">Password</label>
      <div class="auth-input-wrap">
        <i class="ti ti-lock auth-input-icon"></i>
        <input class="auth-input" type="password" id="password" name="password"
               placeholder="Enter your password"
               autocomplete="current-password" required>
        <button type="button" class="pw-toggle"
                onclick="togglePassword('password', this)"
                aria-label="Toggle password visibility">
          <i class="ti ti-eye"></i>
        </button>
      </div>
    </div>
    <div class="auth-remember-row">
      <label class="auth-checkbox-label">
        <input type="checkbox" name="remember_me" id="remember_me"
               class="auth-checkbox">
        <span class="auth-checkbox-custom"></span>
        Remember me for {{ remember_days }} days
      </label>
    </div>
    <button type="submit" class="auth-btn">
      <span class="auth-btn-inner">Sign In <i class="ti ti-arrow-right"></i></span>
    </button>
  </form>

  <p class="auth-footer" style="margin-top:14px;">
    <a href="{{ url_for('forgot_password') }}" class="auth-footer-dim">
      Forgot password?
    </a>
  </p>
  <p class="auth-footer">
    No account? <a href="{{ url_for('signup') }}">Create one</a>
  </p>
{% endblock %}
